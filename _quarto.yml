project:
  type: website
  output-dir: _site

website:
  title: "Vitus Bering exploring the Data seas"
  navbar:
    background: primary
    left:
      - href: posts/index.qmd # blog posts
        text: Blog
      - publications.qmd # list of my relevant publications
      #- cv.qmd # pdf of my cv
      - favourites.qmd # pdf of my cv
      - about.qmd # about me page
  #site-url: https://<user>.github.io/<repo>/

format:
  html:
    theme: zephyr # remember to change it in _metadata.yml in posts
    toc: true
    css: styles.css

# Reduce "boot-time" by telling Quarto to stay out of some folders?
exclude:
  - drafts/**
  - data/**
  - scripts/**
  - playground/**
  - apps/**
  - blog_archive/**
  - renv/**
  - .forme/**
